<title>login page</title>

<body>


<form class="loginbox" autocomplete="off">
    <fieldset>
        <p style="display: none;" class="error">Error. Please enter correct email &amp; password.</p>
        <label for="username">E-mail</label>
        <input type="text" id="username" />
        <label for="username">Password</label>
        <input type="password" id="password" />
        <input type="submit" id="submit" value="LOG IN" />
    </fieldset>
</form>

<script>
    $(document).ready(function() {
    $('#username').focus();

    $('#submit').click(function() {

        event.preventDefault(); // prevent PageReLoad
        $('.error').css('display', 'none'); // hide error msg

        var ValEmail = $('#username'); // Email Value
        var ValPassword = $('#password'); // Password Value

        if (ValEmail == "admin@admin.com" & ValPassword == "admin") { // if ValEmail & ValPass are as above
            alert('valid!'); // alert valid!
            window.location = "home.html"; // go to home.html
        }
        else {
            alert('not valid! password: '+ ValPassword + 'val email: '+ValEmail); // alert not valid!
            $('.error').css('display', 'block'); // show error msg
        }
    });
});
</script>
