<title>login page 2</title>
</head>
<body>


<form class="loginbox" autocomplete="off" name="loginwebform2">
    <fieldset>
        <p style="display: none;" class="error">Error. Please enter correct email &amp; password.</p>
        <p>E-mail</p>
        <input type="text" id="username" name="username"/>
        <p>Password</p>
        <input type="password" id="password" name="password"/>
        <input type="submit" id="submit" value="LOG IN" name="loginbutton"/>
    </fieldset>
</form>

<script>

document.addEventListener("DOMContentLoaded", function () {
  // Focus username input
  document.querySelector("#username").focus();

  document.querySelector("#submit").addEventListener("click", function (event) {
    event.preventDefault(); // prevent page reload

    // Hide error message
    document.querySelectorAll(".error").forEach(el => {
      el.style.display = "none";
    });

    // Get input VALUES (not elements)
    const valEmail = document.querySelector("#username").value;
    const valPassword = document.querySelector("#password").value;

    if (valEmail == "admin" && valPassword == "admin") {
      alert("valid!");
      window.location.href = "loginhome.html";
    } else {
      alert(
        "not valid! password: " + valPassword + " val email: " + valEmail
      );

      // Show error message
      document.querySelectorAll(".error").forEach(el => {
        el.style.display = "block";
      });
    }
  });
});

</script>
